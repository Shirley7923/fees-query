<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>费用查询与缴费</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 480px; margin: 0 auto; }
        
        .glass-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            color: white;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.8; font-size: 14px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102,126,234,0.4);
        }
        
        .result-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
            border: 2px solid #e8e8ff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .result-card .name { font-size: 20px; color: #333; margin-bottom: 16px; }
        .amount {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        .amount small { font-size: 20px; }
        
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .status-badge.paid { background: #d4edda; color: #155724; }
        .status-badge.unpaid { background: #fff3cd; color: #856404; }
        
        .qr-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
            text-align: center;
        }
        .qr-section h3 {
            color: #333;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .qr-code {
            width: 200px;
            height: 200px;
            background: #f5f5f5;
            border-radius: 12px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
        }
        .qr-amount {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .qr-hint {
            font-size: 12px;
            color: #999;
            margin-top: 12px;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
        
        /* 管理员入口 */
        .admin-link {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .admin-link:hover { background: rgba(0,0,0,0.5); }
        
        /* 管理后台样式 */
        .admin-panel {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            margin: -20px;
            padding: 20px;
        }
        .admin-panel .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .admin-header h2 { font-size: 20px; }
        .back-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table th, .data-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .data-table th {
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }
        .status-badge-admin.paid { background: rgba(82,196,26,0.2); color: #52c41a; padding: 4px 8px; border-radius: 4px; }
        .status-badge-admin.unpaid { background: rgba(255,77,79,0.2); color: #ff4d4f; padding: 4px 8px; border-radius: 4px; }
        
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 6px;
            background: #1677ff;
            color: white;
        }
        .action-btn.paid-btn { background: #52c41a; }
        
        .info-box {
            background: rgba(102,126,234,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 成员端 -->
    <div id="memberPanel">
        <div class="header">
            <h1>💰 费用查询与缴费</h1>
            <p>输入您的姓名和身份证号查询应缴金额</p>
        </div>
        
        <div class="container">
            <div class="glass-card">
                <form id="queryForm" onsubmit="handleQuery(event)">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="name" placeholder="请输入您的姓名" required>
                    </div>
                    <div class="form-group">
                        <label>身份证号</label>
                        <input type="text" id="idCard" placeholder="请输入18位身份证号" maxlength="18" required>
                    </div>
                    <button type="submit" class="btn btn-primary">🔍 查询费用</button>
                </form>
                
                <div id="resultArea" style="display:none;">
                    <!-- 查询结果将显示在这里 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 管理后台 -->
    <div id="adminPanel" style="display:none;">
        <div class="admin-panel">
            <div class="container">
                <div class="glass-card">
                    <div class="admin-header">
                        <h2>⚙️ 管理后台</h2>
                        <button class="back-btn" onclick="showMemberPanel()">← 返回查询</button>
                    </div>
                    
                    <div class="info-box">
                        📋 共 <strong id="totalCount">0</strong> 人，待缴费 <strong id="unpaidCount">0</strong> 人
                    </div>
                    
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <a class="admin-link" onclick="showAdminPanel()">⚙️ 管理</a>

    <script>
        // ========== 配置 ==========
        const CONFIG = {
            // 修改这个值为你的专属密钥
            adminKey: 'admin2026',
            // 收款码配置（请替换为你的收款码图片地址）
            qrCodeUrl: ''
        };

        // ========== 内置数据 ==========
        const MEMBERS_DATA = [
            { name: "张三", idCard: "110101199001011234", amount: 1500, paid: false },
            { name: "李四", idCard: "110101199002021235", amount: 2800, paid: true },
            { name: "王五", idCard: "110101199003031236", amount: 1200, paid: false },
            { name: "赵六", idCard: "110101199004041237", amount: 3500, paid: true },
            { name: "钱七", idCard: "110101199005051238", amount: 2000, paid: false },
            { name: "孙八", idCard: "110101199006061239", amount: 1800, paid: false },
            { name: "周九", idCard: "110101199007071240", amount: 2200, paid: true },
            { name: "吴十", idCard: "110101199008081241", amount: 1600, paid: false }
        ];

        // 从本地存储加载缴费状态
        function loadPaymentStatus() {
            const stored = localStorage.getItem('fees_payment_status');
            if (stored) {
                const status = JSON.parse(stored);
                MEMBERS_DATA.forEach(member => {
                    if (status[member.idCard] !== undefined) {
                        member.paid = status[member.idCard];
                    }
                });
            }
        }

        // 保存缴费状态
        function savePaymentStatus() {
            const status = {};
            MEMBERS_DATA.forEach(member => {
                status[member.idCard] = member.paid;
            });
            localStorage.setItem('fees_payment_status', JSON.stringify(status));
        }

        // 切换面板
        function showAdminPanel() {
            document.getElementById('memberPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.querySelector('.admin-link').style.display = 'none';
            renderAdminTable();
        }

        function showMemberPanel() {
            document.getElementById('memberPanel').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            // 返回时重新检查URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('key');
            if (key === CONFIG.adminKey) {
                document.querySelector('.admin-link').style.display = 'block';
            }
        }

        // 查询处理
        function handleQuery(e) {
            e.preventDefault();
            
            loadPaymentStatus(); // 加载最新状态
            
            const name = document.getElementById('name').value.trim();
            const idCard = document.getElementById('idCard').value.trim().replace(/\s/g, '');
            
            if (!name || !idCard) {
                showToast('请填写完整信息');
                return;
            }
            
            // 查找匹配记录
            const member = MEMBERS_DATA.find(m => 
                m.name === name && m.idCard === idCard
            );
            
            const resultArea = document.getElementById('resultArea');
            
            if (!member) {
                resultArea.innerHTML = `
                    <div style="text-align:center;padding:30px;color:#ff4d4f;">
                        <div style="font-size:48px;margin-bottom:12px;">❌</div>
                        <p style="font-size:16px;">未找到匹配记录</p>
                        <p style="font-size:13px;color:#888;margin-top:8px;">请核对姓名和身份证号是否正确</p>
                    </div>
                `;
                resultArea.style.display = 'block';
                return;
            }
            
            // 显示结果
            let resultHtml = `
                <div class="result-card">
                    <div class="name">👤 ${member.name}</div>
                    <span class="status-badge ${member.paid ? 'paid' : 'unpaid'}">
                        ${member.paid ? '✅ 已缴费' : '⏳ 待缴费'}
                    </span>
                    <div class="amount"><small>¥</small>${member.amount.toFixed(2)}</div>
            `;
            
            // 如果未缴费，显示收款码
            if (!member.paid) {
                resultHtml += `
                    <div class="qr-section">
                        <h3>📱 扫码支付</h3>
                        <div class="qr-code">
                            <div>
                                <div style="font-size:60px;">💳</div>
                                <div style="margin-top:8px;">微信/支付宝</div>
                            </div>
                        </div>
                        <div class="qr-amount">¥ ${member.amount.toFixed(2)}</div>
                        <div class="qr-hint">支付完成后，请联系管理员确认</div>
                    </div>
                `;
            } else {
                resultHtml += `
                    <div style="margin-top:20px;padding:16px;background:#d4edda;border-radius:12px;color:#155724;">
                        ✅ 您已完成缴费，感谢您的配合！
                    </div>
                `;
            }
            
            resultHtml += '</div>';
            resultArea.innerHTML = resultHtml;
            resultArea.style.display = 'block';
        }

        // Toast提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 渲染管理后台表格
        function renderAdminTable() {
            loadPaymentStatus();
            
            const total = MEMBERS_DATA.length;
            const unpaid = MEMBERS_DATA.filter(m => !m.paid).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('unpaidCount').textContent = unpaid;
            
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = MEMBERS_DATA.map(m => `
                <tr>
                    <td>${m.name}</td>
                    <td>¥${m.amount.toFixed(2)}</td>
                    <td>
                        <span class="status-badge-admin ${m.paid ? 'paid' : 'unpaid'}">
                            ${m.paid ? '已缴费' : '待缴费'}
                        </span>
                    </td>
                    <td>
                        ${!m.paid ? `<button class="action-btn paid-btn" onclick="markPaid('${m.idCard}')">确认缴费</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        // 标记已缴费
        function markPaid(idCard) {
            const member = MEMBERS_DATA.find(m => m.idCard === idCard);
            if (member) {
                member.paid = true;
                savePaymentStatus();
                renderAdminTable();
                showToast('✅ 已标记为已缴费');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadPaymentStatus();
            
            // 检查URL参数，控制管理按钮显示
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('key');
            
            if (key === CONFIG.adminKey) {
                document.querySelector('.admin-link').style.display = 'block';
            } else {
                document.querySelector('.admin-link').style.display = 'none';
            }
        });
    </script>
</body>
</html>
